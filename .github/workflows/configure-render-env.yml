name: Configure Render Environment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to configure'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

jobs:
  configure-env:
    runs-on: ubuntu-latest
    name: Configure API Keys on Render
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Configure API Keys on Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🚀 Configurando API Keys no Render..."
          
          # Criar script de configuração
          cat > configure-render.js << 'EOF'
          const https = require('https');
          
          const RENDER_API_KEY = process.env.RENDER_API_KEY;
          const SERVICE_ID = process.env.RENDER_SERVICE_ID;
          
          const envVars = [
            { name: 'ANTHROPIC_API_KEY', value: process.env.ANTHROPIC_API_KEY },
            { name: 'OPENAI_API_KEY', value: process.env.OPENAI_API_KEY },
            { name: 'GEMINI_API_KEY', value: process.env.GEMINI_API_KEY }
          ];
          
          if (!RENDER_API_KEY || !SERVICE_ID) {
            console.error('❌ Erro: RENDER_API_KEY ou RENDER_SERVICE_ID não configuradas');
            process.exit(1);
          }
          
          async function configureEnvVar(name, value) {
            if (!value) {
              console.log(`⚠️ ${name}: não configurada (opcional)`);
              return;
            }
            
            return new Promise((resolve, reject) => {
              const options = {
                hostname: 'api.render.com',
                path: `/v1/services/${SERVICE_ID}/env-vars/${name}`,
                method: 'PUT',
                headers: {
                  'Authorization': `Bearer ${RENDER_API_KEY}`,
                  'Content-Type': 'application/json',
                  'Accept': 'application/json'
                }
              };
              
              const data = JSON.stringify({ value });
              
              const req = https.request(options, (res) => {
                let responseData = '';
                
                res.on('data', (chunk) => {
                  responseData += chunk;
                });
                
                res.on('end', () => {
                  if (res.statusCode === 200 || res.statusCode === 201) {
                    console.log(`✅ ${name} configurada com sucesso!`);
                    resolve();
                  } else {
                    console.error(`❌ Erro ao configurar ${name}: ${res.statusCode}`);
                    reject(new Error(responseData));
                  }
                });
              });
              
              req.on('error', (e) => {
                reject(e);
              });
              
              req.write(data);
              req.end();
            });
          }
          
          async function main() {
            for (const envVar of envVars) {
              try {
                await configureEnvVar(envVar.name, envVar.value);
              } catch (err) {
                console.error(`Erro: ${err.message}`);
              }
            }
          }
          
          main();
          EOF
          
          # Executar script
          node configure-render.js
          
      - name: Trigger Deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          echo "🔄 Acionando deploy no Render..."
          
          curl -X POST \
            "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --silent
          
          echo ""
          echo "✅ Deploy acionado!"
          
      - name: Summary
        run: |
          echo "## ✅ API Keys Configuradas!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Variáveis configuradas:" >> $GITHUB_STEP_SUMMARY
          echo "- ANTHROPIC_API_KEY (Claude)" >> $GITHUB_STEP_SUMMARY
          echo "- OPENAI_API_KEY (GPT-4o)" >> $GITHUB_STEP_SUMMARY
          echo "- GEMINI_API_KEY (Gemini)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Próximos passos:" >> $GITHUB_STEP_SUMMARY
          echo "1. Aguarde o deploy completar (~2 minutos)" >> $GITHUB_STEP_SUMMARY
          echo "2. Teste em: https://frontend-six-lemon-74.vercel.app" >> $GITHUB_STEP_SUMMARY
